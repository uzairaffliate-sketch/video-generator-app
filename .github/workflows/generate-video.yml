name: Generate Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Database job ID (UUID)"
        required: true
        type: string
      script_text:
        description: "Full script for voiceover"
        required: true
        type: string
      drive_folder_id:
        description: "Google Drive folder ID"
        required: true
        type: string
      language:
        description: "Voice language code (en, ur, hi, ar)"
        required: false
        default: "en"
        type: string
      callback_url:
        description: "URL to notify when done (Next.js API)"
        required: false
        type: string

jobs:
  generate-video:
    name: Generate Video - Job ${{ inputs.job_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r python/requirements.txt
          echo "✅ Dependencies installed"

      - name: Create Working Directories
        run: |
          mkdir -p /tmp/work/images
          mkdir -p /tmp/work/audio
          mkdir -p /tmp/work/output
          echo "✅ Directories created"

      - name: Save Script to File
        run: |
          cat > /tmp/work/script.txt << 'SCRIPT_EOF'
          ${{ inputs.script_text }}
          SCRIPT_EOF
          echo "✅ Script saved ($(wc -w < /tmp/work/script.txt) words)"

      - name: Download Images from Google Drive
        run: |
          echo "📥 Downloading images from Drive folder: ${{ inputs.drive_folder_id }}"
          python python/drive_fetcher.py \
            "${{ inputs.drive_folder_id }}" \
            "/tmp/work/images"
          
          IMAGE_COUNT=$(ls /tmp/work/images/*.jpg /tmp/work/images/*.jpeg /tmp/work/images/*.png 2>/dev/null | wc -l)
          echo "✅ Downloaded $IMAGE_COUNT images"
          if [ "$IMAGE_COUNT" -eq "0" ]; then
            echo "❌ No images downloaded! Check Drive folder is public."
            exit 1
          fi

      - name: Match Script to Images
        run: |
          echo "🔗 Matching script segments to images..."
          python python/image_matcher.py \
            "/tmp/work/script.txt" \
            "/tmp/work/images/downloaded_files.json" \
            "/tmp/work/matched.json"
          SEGMENTS=$(python -c "import json; d=json.load(open('/tmp/work/matched.json')); print(d['total_segments'])")
          echo "✅ Created $SEGMENTS segments"

      - name: Generate Voiceover (gTTS)
        run: |
          echo "🎙️ Generating voiceover in language: ${{ inputs.language }}"
          python python/voice_generator.py \
            "/tmp/work/script.txt" \
            "/tmp/work/audio/voiceover.mp3" \
            "${{ inputs.language }}"
          AUDIO_SIZE=$(du -sh /tmp/work/audio/voiceover.mp3 | cut -f1)
          echo "✅ Audio generated: $AUDIO_SIZE"

      - name: Render Video with Ken Burns Effect
        run: |
          echo "🎬 Rendering video..."
          echo "Settings: libx264, 4000k, fps=25, preset=faster, tune=stillimage"
          python python/video_generator.py \
            "/tmp/work/matched.json" \
            "/tmp/work/audio/voiceover.mp3" \
            "/tmp/work/output/final_video.mp4"
          if [ -f "/tmp/work/output/final_video.mp4" ]; then
            VIDEO_SIZE=$(du -sh /tmp/work/output/final_video.mp4 | cut -f1)
            echo "✅ Video rendered: $VIDEO_SIZE"
          else
            echo "❌ Video rendering failed!"
            exit 1
          fi

      # ── Step 11: Upload as GitHub Artifact (Most Reliable) ──────────────
      - name: Upload Video Artifact
        uses: actions/upload-artifact@v4
        with:
          name: video-${{ inputs.job_id }}
          path: /tmp/work/output/final_video.mp4
          retention-days: 90
          if-no-files-found: error

      # ── Step 12: Generate Direct Download Link ───────────────────────────
      - name: Generate Download Link
        id: get_link
        run: |
          echo "🔗 Generating download link..."
          
          # GitHub API se artifact ID fetch karo
          ARTIFACT_ID=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/actions/artifacts" \
            | jq -r --arg name "video-${{ inputs.job_id }}" '.artifacts[] | select(.name==$name) | .id')
          
          if [ -z "$ARTIFACT_ID" ]; then
            echo "❌ Artifact not found!"
            exit 1
          fi
          
          # Direct download URL (valid 1 hour)
          DOWNLOAD_URL="https://api.github.com/repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip"
          echo "DOWNLOAD_URL=$DOWNLOAD_URL" >> $GITHUB_ENV
          echo "ARTIFACT_ID=$ARTIFACT_ID" >> $GITHUB_ENV

      # ── Step 13: Show Download Instructions ──────────────────────────────
      - name: Show Download Instructions
        run: |
          echo "========================================"
          echo "🎬 VIDEO READY FOR DOWNLOAD"
          echo "========================================"
          echo ""
          echo "📌 OPTION 1: GitHub UI (Recommended)"
          echo "   Go to: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          echo "   Click on Artifacts → video-${{ inputs.job_id }} → Download"
          echo ""
          echo "📌 OPTION 2: API Link (Fast, 1 hour valid)"
          echo "   ${{ env.DOWNLOAD_URL }}"
          echo "   (Use this link in browser or curl)"
          echo ""
          echo "📌 OPTION 3: GitHub CLI (Fastest)"
          echo "   gh run download ${{ github.run_id }} -n video-${{ inputs.job_id }}"
          echo ""
          echo "========================================"
          echo "⏰ Artifact available for 90 days"
          echo "📦 File: video-${{ inputs.job_id }}.zip (contains MP4)"
          echo "========================================"

      # ── Step 14: Job metadata save karo ───────────────────────────────────
      - name: Save Job Metadata
        run: |
          cat > /tmp/work/job_info.json << EOF
          {
            "job_id": "${{ inputs.job_id }}",
            "status": "completed",
            "run_id": "${{ github.run_id }}",
            "artifact_name": "video-${{ inputs.job_id }}",
            "download_url": "${{ env.DOWNLOAD_URL }}",
            "github_ui_url": "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}",
            "language": "${{ inputs.language }}"
          }
          EOF
          echo "✅ Job metadata saved"
          cat /tmp/work/job_info.json

      # ── Step 15: Failure handling ──────────────────────────────────────────
      - name: Handle Failure
        if: failure()
        run: |
          echo "❌ Workflow failed for job: ${{ inputs.job_id }}"
          echo "Run ID: ${{ github.run_id }}"
          ls -la /tmp/work/ || true
          ls -la /tmp/work/images/ || true
          ls -la /tmp/work/audio/ || true
