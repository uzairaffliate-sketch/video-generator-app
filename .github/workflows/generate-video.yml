name: Generate Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Database job ID (UUID)"
        required: true
        type: string
      script_text:
        description: "Full script for voiceover"
        required: true
        type: string
      drive_folder_id:
        description: "Google Drive folder ID"
        required: true
        type: string
      language:
        description: "Voice language code (en, ur, hi, ar)"
        required: false
        default: "en"
        type: string
      callback_url:
        description: "URL to notify when done (Next.js API)"
        required: false
        type: string

jobs:
  generate-video:
    name: Generate Video - Job ${{ inputs.job_id }}
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install -r python/requirements.txt
          echo "✅ Dependencies installed"

      - name: Create Working Directories
        run: |
          mkdir -p /tmp/work/images
          mkdir -p /tmp/work/audio
          mkdir -p /tmp/work/output
          echo "✅ Directories created"

      - name: Save Script to File
        run: |
          cat > /tmp/work/script.txt << 'SCRIPT_EOF'
          ${{ inputs.script_text }}
          SCRIPT_EOF
          echo "✅ Script saved ($(wc -w < /tmp/work/script.txt) words)"

      - name: Download Images from Google Drive
        run: |
          echo "📥 Downloading images from Drive folder: ${{ inputs.drive_folder_id }}"
          python python/drive_fetcher.py \
            "${{ inputs.drive_folder_id }}" \
            "/tmp/work/images"
          
          IMAGE_COUNT=$(ls /tmp/work/images/*.jpg /tmp/work/images/*.jpeg /tmp/work/images/*.png 2>/dev/null | wc -l)
          echo "✅ Downloaded $IMAGE_COUNT images"
          if [ "$IMAGE_COUNT" -eq "0" ]; then
            echo "❌ No images downloaded! Check Drive folder is public."
            exit 1
          fi

      - name: Match Script to Images
        run: |
          echo "🔗 Matching script segments to images..."
          python python/image_matcher.py \
            "/tmp/work/script.txt" \
            "/tmp/work/images/downloaded_files.json" \
            "/tmp/work/matched.json"
          SEGMENTS=$(python -c "import json; d=json.load(open('/tmp/work/matched.json')); print(d['total_segments'])")
          echo "✅ Created $SEGMENTS segments"

      - name: Generate Voiceover (gTTS)
        run: |
          echo "🎙️ Generating voiceover in language: ${{ inputs.language }}"
          python python/voice_generator.py \
            "/tmp/work/script.txt" \
            "/tmp/work/audio/voiceover.mp3" \
            "${{ inputs.language }}"
          AUDIO_SIZE=$(du -sh /tmp/work/audio/voiceover.mp3 | cut -f1)
          echo "✅ Audio generated: $AUDIO_SIZE"

      - name: Render Video with Ken Burns Effect
        run: |
          echo "🎬 Rendering video..."
          echo "Settings: libx264, 4000k, fps=25, preset=faster, tune=stillimage"
          python python/video_generator.py \
            "/tmp/work/matched.json" \
            "/tmp/work/audio/voiceover.mp3" \
            "/tmp/work/output/final_video.mp4"
          if [ -f "/tmp/work/output/final_video.mp4" ]; then
            VIDEO_SIZE=$(du -sh /tmp/work/output/final_video.mp4 | cut -f1)
            echo "✅ Video rendered: $VIDEO_SIZE"
          else
            echo "❌ Video rendering failed!"
            exit 1
          fi

      # ── Step 11: Upload to catbox.moe (Reliable) ──────────────────────────
      - name: Upload Video to catbox.moe
        run: |
          echo "☁️ Uploading video to catbox.moe..."
          
          # catbox.moe API (no auth, file limit ~200MB)
          RESPONSE=$(curl -F "fileToUpload=@/tmp/work/output/final_video.mp4" \
            -F "reqtype=fileupload" \
            https://catbox.moe/user/api.php 2>/dev/null)
          
          if [[ "$RESPONSE" == https://files.catbox.moe/* ]]; then
            echo "✅ Upload Successful!"
            echo "🔗 Download Link: $RESPONSE"
            echo "$RESPONSE" > /tmp/work/output/download_link.txt
            echo "DOWNLOAD_LINK=$RESPONSE" >> $GITHUB_ENV
          else
            echo "❌ Upload failed: $RESPONSE"
            echo "⚠️ Trying file.io as fallback..."
            
            # Fallback: file.io (with 10 min timeout)
            curl --connect-timeout 60 --max-time 600 -F "file=@/tmp/work/output/final_video.mp4" \
              https://file.io -o /tmp/work/output/upload_response.txt
            
            LINK=$(cat /tmp/work/output/upload_response.txt | grep -o '"link":"[^"]*"' | cut -d'"' -f4)
            if [[ -n "$LINK" ]]; then
              echo "✅ Upload Successful (fallback)!"
              echo "🔗 Download Link: $LINK"
              echo "$LINK" > /tmp/work/output/download_link.txt
              echo "DOWNLOAD_LINK=$LINK" >> $GITHUB_ENV
            else
              echo "❌ Both upload methods failed."
              exit 1
            fi
          fi

      # ── Step 12: Show Download Link ────────────────────────────────────────
      - name: Show Download Link
        run: |
          echo "========================================"
          echo "🎬 VIDEO READY FOR DOWNLOAD"
          echo "========================================"
          if [ -f "/tmp/work/output/download_link.txt" ]; then
            LINK=$(cat /tmp/work/output/download_link.txt)
            echo "🔗 $LINK"
          fi
          echo "========================================"
          echo "⏰ catbox.moe link is permanent (no expiry)"
          echo "========================================"

      # ── Step 13: Job metadata save karo ───────────────────────────────────
      - name: Save Job Metadata
        run: |
          cat > /tmp/work/job_info.json << EOF
          {
            "job_id": "${{ inputs.job_id }}",
            "status": "completed",
            "run_id": "${{ github.run_id }}",
            "download_link": "$(cat /tmp/work/output/download_link.txt 2>/dev/null || echo 'N/A')",
            "language": "${{ inputs.language }}"
          }
          EOF
          echo "✅ Job metadata saved"
          cat /tmp/work/job_info.json

      # ── Step 14: Failure handling ──────────────────────────────────────────
      - name: Handle Failure
        if: failure()
        run: |
          echo "❌ Workflow failed for job: ${{ inputs.job_id }}"
          echo "Run ID: ${{ github.run_id }}"
          ls -la /tmp/work/ || true
          ls -la /tmp/work/images/ || true
          ls -la /tmp/work/audio/ || true
